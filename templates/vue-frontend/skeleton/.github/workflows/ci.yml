name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: backstage-test-1/${{ values.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ '${{' }} env.REGISTRY }}
          username: ${{ '${{' }} github.actor }}
          password: ${{ '${{' }} secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ '${{' }} env.REGISTRY }}/${{ '${{' }} env.IMAGE_NAME }}:${{ '${{' }} github.sha }}
            ${{ '${{' }} env.REGISTRY }}/${{ '${{' }} env.IMAGE_NAME }}:latest

      - name: Update image tag in k8s/deployment.yaml
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          IMAGE_TAG="${{ '${{' }} github.sha }}"
          sed -i "s|image: ghcr.io/backstage-test-1/${{ values.name }}:.*|image: ghcr.io/backstage-test-1/${{ values.name }}:${IMAGE_TAG}|g" k8s/deployment.yaml

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add k8s/deployment.yaml
            git commit -m "ci: update image tag to ${IMAGE_TAG} [skip ci]"
            git push
          fi

      - name: Setup Node.js for TechDocs
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install TechDocs core
        run: pip install mkdocs-techdocs-core==1.*

      - name: Install TechDocs CLI
        run: npm install -g @techdocs/cli

      - name: Generate TechDocs
        run: techdocs-cli generate --no-docker

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ '${{' }} vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ '${{' }} vars.AZURE_TENANT_ID }}
          subscription-id: ${{ '${{' }} vars.AZURE_SUBSCRIPTION_ID }}

      - name: Publish TechDocs to Azure Blob Storage
        env:
          AZURE_TENANT_ID: ${{ '${{' }} vars.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ '${{' }} vars.AZURE_CLIENT_ID }}
        run: |
          techdocs-cli publish \
            --publisher-type azureBlobStorage \
            --storage-name techdocs-container \
            --entity default/component/${{ values.name }}
